name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BIN="ai-net-doctor${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$BIN" ./cmd/ai-net-doctor
          DIST="ai-net-doctor_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "$DIST.zip" "$BIN" README.md LICENSE
            echo "ASSET=$DIST.zip" >> "$GITHUB_ENV"
          else
            tar -czf "$DIST.tar.gz" "$BIN" README.md LICENSE
            echo "ASSET=$DIST.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
          generate_release_notes: true
